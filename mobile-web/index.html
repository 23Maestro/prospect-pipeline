<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070816" />
    <link rel="icon" href="/assets/prospect-pipeline.png" />
    <title>Prospect Mobile</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-mark" src="/assets/prospect-pipeline.png" alt="" />
          <div>
            <p class="eyeline">Prospect Pipeline</p>
            <h1 id="page-title">Set Meetings</h1>
          </div>
        </div>
        <button class="icon-button" id="refresh-button" type="button" aria-label="Refresh">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 11a8.1 8.1 0 0 0-14.2-5.3L4 7.5V3H.5l2.9 2.9A10.9 10.9 0 0 1 22.7 11h-2.7Zm-16 2a8.1 8.1 0 0 0 14.2 5.3l1.8-1.8V21h3.5l-2.9-2.9A10.9 10.9 0 0 1 1.3 13H4Z" />
          </svg>
        </button>
      </header>

      <nav class="tabbar" aria-label="Mobile workflows">
        <a href="/set-meetings" data-route="/set-meetings">Set</a>
        <a href="/scout-schedules" data-route="/scout-schedules">Schedules</a>
        <a href="/contact-reminder" data-route="/contact-reminder">Reminder</a>
      </nav>

      <section class="toolbar" id="week-toolbar">
        <div class="segmented" role="group" aria-label="Week">
          <button type="button" data-week="this">This week</button>
          <button type="button" data-week="next">Next week</button>
        </div>
      </section>

      <section class="status-line" id="status-line" aria-live="polite"></section>
      <section class="content" id="content"></section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
